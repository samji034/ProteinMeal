<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F7F6F2">
  <title>ProteinMeals — Mes recettes protéinées</title>
  <meta name="description" content="Toutes mes recettes de cuisine protéinées : calories, protéines et étapes détaillées.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>

  <!-- ===================== EN-TÊTE ===================== -->
  <header class="site-header">
    <h1 class="site-title">Protein<span>Meals</span></h1>
    <p class="site-subtitle">Mes recettes riches en protéines</p>

    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/>
        </svg>
        <input id="search" type="search" placeholder="Rechercher un plat…" autocomplete="off" aria-label="Rechercher un plat">
      </div>

      <div class="sort-wrap">
        <button id="sort-btn" class="sort-btn" aria-haspopup="true" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
            <line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="17" x2="9" y2="17"/>
          </svg>
          <span>Trier par</span>
        </button>
        <div id="sort-menu" class="sort-menu" role="menu" hidden>
          <button class="sort-option" data-sort="proteines" role="menuitemradio" aria-checked="false">
            <span class="check" aria-hidden="true"></span>
            Protéines
          </button>
          <button class="sort-option" data-sort="calories" role="menuitemradio" aria-checked="false">
            <span class="check" aria-hidden="true"></span>
            Calories
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ===================== LISTE DES RECETTES ===================== -->
  <main>
    <p id="count" class="count" aria-live="polite"></p>
    <ul id="recipe-list" class="recipe-list"></ul>
    <p id="empty" class="empty" hidden>Aucun plat ne correspond à ta recherche.</p>
  </main>

  <!-- ===================== POPUP RECETTE ===================== -->
  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button id="modal-close" class="modal-close" aria-label="Fermer la recette">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
      </button>
      <div class="modal-img-wrap">
        <img id="modal-img" alt="">
      </div>
      <div class="modal-body">
        <h2 id="modal-title"></h2>
        <div id="modal-stats" class="modal-stats"></div>
        <div class="add-row">
          <div class="qty-stepper" aria-label="Nombre de fois la recette">
            <button id="qty-minus" type="button" aria-label="Moins">−</button>
            <span id="qty-value">×1</span>
            <button id="qty-plus" type="button" aria-label="Plus">+</button>
          </div>
          <button id="modal-add-cart" class="add-cart-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="9" cy="21" r="1.6"/><circle cx="19" cy="21" r="1.6"/>
            <path d="M2 3h3l2.6 12.5a1.8 1.8 0 0 0 1.8 1.5h9.2a1.8 1.8 0 0 0 1.8-1.4L22 7H6"/>
          </svg>
          <span id="modal-add-cart-label">Ajouter à la liste de courses</span>
        </button>
        </div>
        <h3>Ingrédients</h3>
        <ul id="modal-ingredients" class="ingredients"></ul>
        <h3>Préparation</h3>
        <ol id="modal-steps" class="steps"></ol>
      </div>
    </article>
  </div>

  <!-- ===================== BOUTON LISTE DE COURSES ===================== -->
  <button id="cart-btn" class="cart-btn" type="button" aria-label="Ouvrir la liste de courses">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="9" cy="21" r="1.6"/><circle cx="19" cy="21" r="1.6"/>
      <path d="M2 3h3l2.6 12.5a1.8 1.8 0 0 0 1.8 1.5h9.2a1.8 1.8 0 0 0 1.8-1.4L22 7H6"/>
    </svg>
    <span id="cart-count" class="cart-count" hidden>0</span>
  </button>

  <!-- ===================== POPUP LISTE DE COURSES ===================== -->
  <div id="cart-modal" class="modal" hidden>
    <div class="modal-backdrop" data-close-cart></div>
    <article class="modal-card cart-card" role="dialog" aria-modal="true" aria-labelledby="cart-title">
      <button id="cart-close" class="modal-close" aria-label="Fermer la liste de courses">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
      </button>
      <div class="modal-body">
        <h2 id="cart-title">🛒 Liste de courses</h2>
        <p id="cart-empty" class="cart-empty">Ta liste est vide. Ouvre une recette et appuie sur « Ajouter à la liste de courses ».</p>
        <ul id="cart-list" class="cart-list"></ul>
        <div id="cart-actions" class="cart-actions" hidden>
          <button id="cart-copy" class="btn-primary" type="button">Copier la liste</button>
          <button id="cart-clear" class="btn-ghost" type="button">Tout vider</button>
        </div>
      </div>
    </article>
  </div>

  <footer class="site-footer">ProteinMeals · fait maison 🍳</footer>

  <script src="js/recipes.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
